site_name: Robot Framework Workshop — 42 Vienna
site_description: E2E testing workshop using Robot Framework and Browser Library
site_url: https://hackxit.github.io/42vienna-robotframework-workshop/
repo_url: https://github.com/HackXIt/42vienna-robotframework-workshop
repo_name: HackXIt/42vienna-robotframework-workshop

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup:
    - Getting Started: getting-started.md
    - Windows Setup: windows-setup.md
    - Student Workflow: student-workflow.md
  - Reference:
    - RF Syntax Cheatsheet: rf-syntax-cheatsheet.md
    - Browser Library Guide: browser-library-guide.md
    - Troubleshooting: troubleshooting.md
  - Workshop:
    - Exercises: exercises.md
    - Optional Practice Sites: optional-practice-sites.md
    - AI-Assisted Testing: ai-assisted-testing.md
    - Workshop Agenda: workshop-agenda.md
    - AI Demo Script: ai-demo-script.md
  - Keywords: keywords/index.md

docs_dir: docs
